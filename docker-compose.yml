services:
  api:
    build:
      context: ./backend/api
      target: development
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: truxify_telemetry
      REDIS_URL: redis://redis:6379
      ML_API_KEY: ${ML_API_KEY:?ML_API_KEY is required}
      ML_ENGINE_URL: http://ml-engine:8000
    volumes:
      - ./backend/api:/app
      - /app/node_modules
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health/live || curl -sf http://localhost:5000/api/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
  
  ml-engine:
    build:
      context: ./backend/ml
    container_name: truxify-ml-engine
    ports:
      - "8001:8000"
    environment:
      ML_API_KEY: ${ML_API_KEY:?ML_API_KEY is required}
    volumes:
      - ./backend/ml:/app
  db:
    image: postgis/postgis:15-3.3-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword}
      POSTGRES_DB: ${POSTGRES_DB:-truxify}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:6-jammy
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  mongo_data:
  postgres_data:
