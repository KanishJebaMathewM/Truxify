name: Issue Scheduled Unassignment

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  unassign-inactive:
    name: Unassign Inactive Assignees
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run unassignment script
        uses: actions/github-script@v7
        with:
          script: |
            const { handleScheduledUnassign } = require('./.github/scripts/issue-rules.js');
            await handleScheduledUnassign({ github, context });
